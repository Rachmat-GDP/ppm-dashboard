name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend — install / lint / typecheck / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-frontend-${{ runner.os }}-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-modules-frontend-${{ runner.os }}-

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            next-cache-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint (frontend)
        working-directory: frontend
        run: npm run lint

      - name: Type check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build output
        run: |
          if [ -d frontend/.next ]; then
            echo "Frontend build output generated"
          else
            echo "Frontend build failed to generate .next folder" && exit 1
          fi

  backend-ci:
    name: Backend — install / lint / tests
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm packages (backend)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            npm-backend-${{ runner.os }}-

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: node-modules-backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            node-modules-backend-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint (backend) if configured
        working-directory: backend
        run: |
          if [ -f package.json ] && jq -r '.scripts.lint // empty' package.json | grep -q '.'; then
            npm run lint
          else
            echo "no backend lint configured"
          fi

      - name: Run backend tests if configured
        working-directory: backend
        run: |
          if [ -f package.json ] && jq -r '.scripts.test // empty' package.json | grep -qv 'Error: no test specified'; then
            npm test
          else
            echo "no backend tests configured"
          fi

  pr-check:
    name: PR Checks — aggregate
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report
        run: echo "CI checks completed for PR ${{ github.event.pull_request.number }}"

  deploy:
    name: Deploy Preview / Production
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN && secrets.VERCEL_ORG_ID && secrets.VERCEL_PROJECT_ID }}
        uses: amondnet/vercel-action@v22
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          github-comment: true
          vercel-args: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Skip deploy when Vercel secrets are missing
        if: ${{ !secrets.VERCEL_TOKEN || !secrets.VERCEL_ORG_ID || !secrets.VERCEL_PROJECT_ID }}
        run: echo "Vercel secrets not configured; skipping deploy."

  docker-deploy:
    name: Docker fallback deploy
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && (!secrets.VERCEL_TOKEN || !secrets.VERCEL_ORG_ID || !secrets.VERCEL_PROJECT_ID) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry if available
        if: secrets.GHCR_PAT
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build frontend Docker image
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t enterprise-platform-frontend:${{ github.sha }} frontend
          else
            echo "No frontend Dockerfile found, skipping frontend build."
          fi

      - name: Build backend Docker image
        run: |
          if [ -f backend/Dockerfile ]; then
            docker build -t enterprise-platform-backend:${{ github.sha }} backend
          else
            echo "No backend Dockerfile found, skipping backend build."
          fi

      - name: Push Docker images to GHCR
        if: secrets.GHCR_PAT
        run: |
          if docker image inspect enterprise-platform-frontend:${{ github.sha }} >/dev/null 2>&1; then
            docker tag enterprise-platform-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/enterprise-platform-frontend:${{ github.sha }}
            docker push ghcr.io/${{ github.repository_owner }}/enterprise-platform-frontend:${{ github.sha }}
          fi
          if docker image inspect enterprise-platform-backend:${{ github.sha }} >/dev/null 2>&1; then
            docker tag enterprise-platform-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/enterprise-platform-backend:${{ github.sha }}
            docker push ghcr.io/${{ github.repository_owner }}/enterprise-platform-backend:${{ github.sha }}
          fi

      - name: Docker fallback deploy note
        run: echo "Docker fallback path completed. Set GHCR_PAT to push images to GitHub Container Registry."
